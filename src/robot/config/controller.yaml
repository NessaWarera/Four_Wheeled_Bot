controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController


diff_drive_controller:
  ros__parameters:

    left_wheel_names: [
      "FrontLeftWheel_link_joint",
      "BackLeftWheel_link_joint"
    ]

    right_wheel_names: [
      "FrontRightWheel_link_joint",
      "BackRightWheel_link_joint"
    ]

    wheel_separation: 0.13
    wheel_radius: 0.03

    # General settings
    publish_rate: 50
    use_stamped_vel: false

    # Odometry
    odom_frame_id: odom
    base_frame_id: Base_link

    # Limits
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0